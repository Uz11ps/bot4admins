<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="bot-shell">
    <header class="bot-header">
        <a class="bot-logo" href="/bot">Infinity Bot Portal</a>
        <nav class="bot-nav">
            <a href="/bot/meeting">Переговорные</a>
            <a href="/bot/broker">Брокеры</a>
            <a href="/bot/order">ПКО/РКО</a>
            <a href="/bot/contracts">Договоры</a>
            <a href="/bot/docflow">Протокол</a>
        </nav>
    </header>
    <main class="bot-content">
        {% block content %}{% endblock %}
    </main>
</div>
{% block extra_scripts %}{% endblock %}
</body>
</html>
