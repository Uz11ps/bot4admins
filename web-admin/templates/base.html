<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Infinity Admin</div>
        <a href="/dashboard">Дашборд</a>
        <a href="/admin/panel">Панель управления</a>
        <a href="/admin/notifications">Уведомления{% if notifications_unread and notifications_unread > 0 %} ({{ notifications_unread }}){% endif %}</a>
        <a href="/modules/order">ПКО/РКО</a>
        <a href="/modules/meeting">Переговорные</a>
        <a href="/modules/contracts">Договоры</a>
        <a href="/modules/docflow">DocFlow</a>
        <a href="/modules/reflection">Reflection</a>
        <a href="/bot">Портал ботов</a>
        <div class="spacer"></div>
        <div class="meta">Пользователь: {{ username }}</div>
        <a href="/logout" class="logout">Выйти</a>
    </aside>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
