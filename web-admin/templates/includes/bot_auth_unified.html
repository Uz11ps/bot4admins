<section class="table-wrapper auth-unified">
    <h2>{{ auth_title }}</h2>
    <div class="auth-grid">
        <form class="inline-form" method="post" action="{{ register_action }}">
            {% if has_access_password %}
            <input type="password" name="access_password" placeholder="{{ access_password_placeholder }}" required>
            {% endif %}
            <input type="text" name="full_name" placeholder="ФИО" required>
            <input type="text" name="{{ department_field_name }}" placeholder="{{ department_placeholder }}" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="account_password" placeholder="Пароль аккаунта" required>
            <button type="submit">{{ register_button_text }}</button>
        </form>
        <form class="inline-form" method="post" action="{{ login_action }}">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <form class="inline-form" method="post" action="{{ reset_action }}">
            <input type="email" name="email" placeholder="Email для сброса" required>
            <input type="password" name="new_password" placeholder="Новый пароль" required>
            <button type="submit">Сбросить пароль</button>
        </form>
    </div>
    {% if current_id %}
    <div class="meta" style="margin-top:8px">{{ current_identity_label }}</div>
    {% endif %}
</section>
